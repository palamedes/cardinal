# SQLite — the board lives inside .cardinal/, per the portable-instance model
# (cardinal.md §16). One directory = one Cardinal instance.
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: .cardinal/cardinal.db

test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary:
    <<: *default
    database: .cardinal/cardinal.db
  cache:
    <<: *default
    database: .cardinal/cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: .cardinal/queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: .cardinal/cable.sqlite3
    migrations_paths: db/cable_migrate
